    <!-- Standard, lightweight logging guards -->
    <script>
      // Suppress benign iframe/websocket trace alerts in dev logs
      if (typeof window !== "undefined") {
        window.__maria_ai_prod__ = true;

        // Catch global unhandled promise rejections specifically for Vite websocket HMR disconnects
        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason;
          const msg = (reason && (reason.message || reason.description || reason.toString())) || '';
          if (msg.toLowerCase().includes('websocket') || msg.toLowerCase().includes('web socket') || msg.toLowerCase().includes('failed to connect')) {
            event.preventDefault();
            event.stopPropagation();
            console.warn('Suppressed benign unhandled rejection:', msg);
          }
        }, true);

        // Catch global error events for websocket issues
        window.addEventListener('error', function(event) {
          const msg = event.message || '';
          if (msg.toLowerCase().includes('websocket') || msg.toLowerCase().includes('web socket')) {
            event.preventDefault();
            event.stopPropagation();
            console.warn('Suppressed benign error:', msg);
          }
        }, true);

        // Proxy WebSocket constructor to automatically catch and suppress connection error events
        if (typeof window.WebSocket !== 'undefined') {
          const OriginalWebSocket = window.WebSocket;
          const PatchedWebSocket = function(url, protocols) {
            try {
              const ws = new OriginalWebSocket(url, protocols);
              ws.addEventListener('error', function(e) {
                // Silently consume HMR connection errors
              });
              return ws;
            } catch (err) {
              console.warn('Suppressed WebSocket construction error:', err);
              // Return a mock object if instantiation fails completely to avoid crashing the caller
              return {
                addEventListener: function() {},
                removeEventListener: function() {},
                close: function() {},
                send: function() {}
              };
            }
          };
          PatchedWebSocket.prototype = OriginalWebSocket.prototype;
          window.WebSocket = PatchedWebSocket;
          Object.defineProperty(window.WebSocket, 'name', { value: 'WebSocket' });
        }
      }
    </script>
