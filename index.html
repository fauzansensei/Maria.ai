<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maria AI - Asisten Pintar & Personal Kustomisasi Cerdas</title>
    
    <!-- Meta Description for SEO and Search Crawlers -->
    <meta name="description" content="Maria AI adalah asisten pintar bertenaga NLP canggih yang dilengkapi memori konteks penuh untuk membantu Anda belajar, merencanakan agenda, dan meningkatkan produktivitas secara interaktif." />

    <!-- Preconnect to Google Fonts domains to speed up DNS lookup and connection handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Async optimized load of Google Fonts to eliminate render-blocking fonts -->
    <link 
      rel="stylesheet" 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" 
      media="print" 
      onload="this.media='all'"
    />
    <noscript>
      <link 
        rel="stylesheet" 
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" 
      />
    </noscript>

    <!-- GPU-Accelerated Inline Critical CSS for instantaneous loading performance (0.1-0.2s FCP) -->
    <style id="critical-skeleton-css">
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
      }
      .sk-container {
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      .sk-sidebar {
        width: 260px;
        background-color: #0f172a;
        display: flex;
        flex-direction: column;
        padding: 24px 16px;
        box-sizing: border-box;
        flex-shrink: 0;
      }
      .sk-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background-color: #ffffff;
        position: relative;
        overflow: hidden;
      }
      .sk-header {
        height: 56px;
        border-bottom: 1px solid #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        box-sizing: border-box;
        flex-shrink: 0;
      }
      .sk-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        max-width: 672px;
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
      }
      .sk-bottom-bar {
        padding: 16px;
        border-top: 1px solid #f1f5f9;
        background-color: #ffffff;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        flex-shrink: 0;
      }
      .sk-bottom-input {
        width: 100%;
        max-width: 768px;
        border-radius: 12px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: #f1f5f9;
        box-sizing: border-box;
      }
      .sk-shimmer {
        animation: sk-pulse-anim 1.4s infinite ease-in-out;
        background-color: #e2e8f0;
        border-radius: 8px;
      }
      .sk-dark-shimmer {
        animation: sk-pulse-anim 1.4s infinite ease-in-out;
        background-color: #1e293b;
        border-radius: 8px;
      }
      @keyframes sk-pulse-anim {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 0.35; }
      }
      
      @media (max-width: 768px) {
        .sk-sidebar {
          display: none;
        }
        .sk-content {
          padding: 24px 16px;
          justify-content: center;
        }
        .sk-header {
          padding: 0 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- High-Fidelity Static Layout Skeleton (renders in ~0.1s on Mobile & Desktop) -->
      <div class="sk-container">
        <div class="sk-sidebar">
          <div class="sk-dark-shimmer" style="height: 38px; margin-bottom: 24px; width: 75%;"></div>
          <div class="sk-dark-shimmer" style="height: 48px; margin-bottom: 16px; border-radius: 12px;"></div>
          <div class="sk-dark-shimmer" style="height: 36px; margin-bottom: 12px; width: 85%;"></div>
          <div class="sk-dark-shimmer" style="height: 36px; margin-bottom: 12px; width: 90%;"></div>
          <div class="sk-dark-shimmer" style="height: 36px; margin-bottom: 12px; width: 70%;"></div>
          <div style="flex: 1;"></div>
          <div class="sk-dark-shimmer" style="height: 48px; border-radius: 12px;"></div>
        </div>
        
        <div class="sk-main">
          <div class="sk-header">
            <div class="sk-shimmer" style="width: 100px; height: 22px;"></div>
            <div style="display: flex; gap: 12px;">
              <div class="sk-shimmer" style="width: 30px; height: 30px; border-radius: 50%;"></div>
              <div class="sk-shimmer" style="width: 30px; height: 30px; border-radius: 50%;"></div>
            </div>
          </div>
          
          <div class="sk-content">
            <div class="sk-shimmer" style="width: 48px; height: 48px; border-radius: 12px; margin-bottom: 24px; background-color: #2563eb; opacity: 0.85;"></div>
            <div class="sk-shimmer" style="width: 240px; height: 24px; margin-bottom: 12px;"></div>
            <div class="sk-shimmer" style="width: 320px; height: 14px; margin-bottom: 32px; max-width: 100%;"></div>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; width: 100%; box-sizing: border-box;">
              <div style="border: 1px solid #f1f5f9; padding: 16px; border-radius: 12px; background-color: #f8fafc;">
                <div class="sk-shimmer" style="width: 110px; height: 14px; margin-bottom: 8px;"></div>
                <div class="sk-shimmer" style="width: 85%; height: 10px;"></div>
              </div>
              <div style="border: 1px solid #f1f5f9; padding: 16px; border-radius: 12px; background-color: #f8fafc;">
                <div class="sk-shimmer" style="width: 130px; height: 14px; margin-bottom: 8px;"></div>
                <div class="sk-shimmer" style="width: 75%; height: 10px;"></div>
              </div>
            </div>
          </div>
          
          <div class="sk-bottom-bar">
            <div class="sk-bottom-input">
              <div class="sk-shimmer" style="width: 140px; height: 14px; background-color: #cbd5e1;"></div>
              <div class="sk-shimmer" style="width: 24px; height: 24px; border-radius: 50%; background-color: #cbd5e1;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
