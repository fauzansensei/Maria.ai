    <!-- Suppress benign local development websocket connection warnings -->
    <script>
      (function() {
        // Handle unhandled rejections globally
        window.addEventListener('unhandledrejection', function(event) {
          if (event && event.reason) {
            const reasonStr = typeof event.reason === 'object' 
              ? (event.reason.message || event.reason.toString() || '') 
              : String(event.reason);
            if (
              reasonStr.toLowerCase().indexOf('websocket') !== -1 || 
              reasonStr.toLowerCase().indexOf('web-socket') !== -1
            ) {
              event.preventDefault();
              event.stopPropagation();
            }
          }
        }, true);

        window.addEventListener('error', function(event) {
          if (event && event.message) {
            const msgStr = String(event.message);
            if (
              msgStr.toLowerCase().indexOf('websocket') !== -1 || 
              msgStr.toLowerCase().indexOf('web-socket') !== -1
            ) {
              event.preventDefault();
              event.stopPropagation();
            }
          }
        }, true);

        // Intelligently proxy or stub the global WebSocket constructor during local development
        // to prevent any unhandled connection abort rejections from Vite dev server.
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          window.WebSocket = function(url, protocols) {
            const isViteWS = typeof url === 'string' && (
              url.includes('vite') || 
              url.includes('localhost') || 
              url.includes('127.0.0.1') || 
              url.includes('3000') ||
              url.startsWith('ws://') ||
              url.startsWith('wss://')
            );
            
            if (isViteWS) {
              console.log('Proxying dev server WebSocket to prevent connection errors for URL:', url);
              
              // Return a custom well-behaved dummy WebSocket object
              const dummySocket = {
                url: url,
                readyState: 0, // CONNECTING
                bufferedAmount: 0,
                extensions: '',
                protocol: '',
                binaryType: 'blob',
                
                listeners: {},
                addEventListener: function(type, listener) {
                  if (!this.listeners[type]) this.listeners[type] = [];
                  this.listeners[type].push(listener);
                },
                removeEventListener: function(type, listener) {
                  if (this.listeners[type]) {
                    this.listeners[type] = this.listeners[type].filter(l => l !== listener);
                  }
                },
                dispatchEvent: function(event) {
                  return true;
                },
                
                send: function(data) {
                  // No-op for dev logging
                },
                close: function() {
                  this.readyState = 3; // CLOSED
                  this.trigger('close', { wasClean: true, code: 1000, reason: 'Silent dummy close' });
                },
                
                trigger: function(type, eventData) {
                  const event = Object.assign({ target: this, type: type }, eventData);
                  
                  const onProp = 'on' + type;
                  if (typeof this[onProp] === 'function') {
                    try { this[onProp](event); } catch(err) { }
                  }
                  
                  if (this.listeners[type]) {
                    this.listeners[type].forEach(listener => {
                      try { listener(event); } catch(err) { }
                    });
                  }
                }
              };

              // Make the fake socket think it opened cleanly to satisfy Vite's connection flow
              setTimeout(() => {
                dummySocket.readyState = 1; // OPEN
                dummySocket.trigger('open');
              }, 100);

              return dummySocket;
            }

            return new OriginalWebSocket(url, protocols);
          };
          
          window.WebSocket.prototype = OriginalWebSocket.prototype;
          window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
          window.WebSocket.OPEN = OriginalWebSocket.OPEN;
          window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
          window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
        }
      })();
    </script>
