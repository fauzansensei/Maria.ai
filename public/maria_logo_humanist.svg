<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="teal-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021B2B" />
      <stop offset="50%" stop-color="#0E4D54" />
      <stop offset="100%" stop-color="#14BCB2" />
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded Square Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#teal-gradient)" />
  
  <!-- Serif "M" -->
  <text 
    x="512" 
    y="650" 
    font-family="Playfair Display, serif" 
    font-size="600" 
    font-weight="900" 
    font-style="italic"
    fill="white" 
    text-anchor="middle"
    fill-opacity="0.95"
    filter="url(#soft-glow)"
  >M</text>
  
  <!-- Tech Sparkle (White/Gold) -->
  <g transform="translate(780 280)">
    <path 
      d="M0 -80C0 -80 0 0 -80 0C0 0 0 80 0 80C0 80 0 0 80 0C0 0 0 -80 0 -80Z" 
      fill="white" 
      fill-opacity="0.8"
    />
  </g>
</svg>
